# Streamlit Cloud + 로컬 공통 설정

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = true
fileWatcherType = "auto"

[theme]
# V3 Zajno 베이지 톤 — 페이지 전환 FOUC 방지 (custom CSS와 동일 색상)
base = "light"
primaryColor = "#EE9A8B"              # coral 액센트
backgroundColor = "#DCD2BD"            # 메인 베이스 (--bg)
secondaryBackgroundColor = "#D5CAB3"   # 사이드바 (--bg-soft)
textColor = "#1A1610"                  # 잉크 (--ink)
font = "sans serif"

[ui]
hideTopBar = true

[client]
toolbarMode = "minimal"
showErrorDetails = true
