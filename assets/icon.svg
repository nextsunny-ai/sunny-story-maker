<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offset"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.18"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 둥근 배경 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- 종이(스크립트) — 살짝 회전 -->
  <g transform="translate(256 268) rotate(-6) translate(-130 -160)">
    <rect x="0" y="0" width="260" height="320" rx="14" fill="url(#paper)" stroke="#E2E8F0" stroke-width="2"/>

    <!-- 헤더 줄 (씬 헤딩 흉내) -->
    <rect x="24" y="32" width="120" height="10" rx="3" fill="#0F172A"/>
    <rect x="24" y="50" width="80" height="6" rx="2" fill="#94A3B8"/>

    <!-- 본문 줄 -->
    <rect x="24" y="86" width="212" height="6" rx="2" fill="#CBD5E1"/>
    <rect x="24" y="104" width="180" height="6" rx="2" fill="#CBD5E1"/>
    <rect x="24" y="122" width="200" height="6" rx="2" fill="#CBD5E1"/>

    <!-- 캐릭터 + 대사 들여쓰기 -->
    <rect x="80" y="148" width="60" height="8" rx="2" fill="#2563EB"/>
    <rect x="100" y="166" width="120" height="6" rx="2" fill="#94A3B8"/>
    <rect x="100" y="180" width="100" height="6" rx="2" fill="#94A3B8"/>

    <rect x="24" y="208" width="212" height="6" rx="2" fill="#CBD5E1"/>
    <rect x="24" y="226" width="160" height="6" rx="2" fill="#CBD5E1"/>

    <rect x="80" y="252" width="50" height="8" rx="2" fill="#2563EB"/>
    <rect x="100" y="270" width="130" height="6" rx="2" fill="#94A3B8"/>
  </g>

  <!-- 깃펜(만년필 닙) — 우상단 강조 -->
  <g transform="translate(330 130) rotate(35)">
    <!-- 펜 몸통 -->
    <rect x="-8" y="-90" width="16" height="120" rx="4" fill="#FFFFFF"/>
    <!-- 펜 닙(촉) -->
    <path d="M -10 30 L 0 64 L 10 30 Z" fill="#FFFFFF"/>
    <path d="M -3 30 L 0 56 L 3 30 Z" fill="#0EA5E9"/>
    <!-- 잉크 점 -->
    <circle cx="0" cy="68" r="5" fill="#2563EB"/>
    <!-- 펜 그립 -->
    <rect x="-10" y="20" width="20" height="6" rx="2" fill="#0EA5E9"/>
  </g>

  <!-- 매직 스파클 (AI 기획 모드 메타포) -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M 110 110 L 116 122 L 128 128 L 116 134 L 110 146 L 104 134 L 92 128 L 104 122 Z"/>
    <circle cx="146" cy="92" r="4"/>
    <circle cx="92" cy="92" r="3"/>
  </g>

  <!-- 모노그램 S (살짝, 우하단) -->
  <text x="412" y="448" font-family="Pretendard, Arial, sans-serif" font-size="64" font-weight="800"
        fill="#FFFFFF" opacity="0.2" text-anchor="middle">S</text>
</svg>
